<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Class Chat</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --accent: #8b5cf6;
      --accent-2: #38bdf8;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --bubble: #1f2937;
      --bubble-user: #4f46e5;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background: linear-gradient(135deg, var(--bg), #1e293b);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .app {
      width: min(900px, 100%);
      background: rgba(17, 24, 39, 0.96);
      border: 3px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    .header {
      padding: 20px 24px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: white;
    }

    .header h1 { margin: 0 0 6px; font-size: 1.4rem; }
    .header p { margin: 0; color: #eef2ff; }

    .chat-area {
      height: 440px;
      overflow-y: auto;
      padding: 20px;
      background: #0b1220;
    }

    .message {
      margin-bottom: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .message.user { align-items: flex-end; }
    .message.bot { align-items: flex-start; }

    .bubble {
      max-width: 80%;
      padding: 12px 14px;
      border-radius: 16px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message.user .bubble {
      background: var(--bubble-user);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.bot .bubble {
      background: var(--bubble);
      color: var(--text);
      border-bottom-left-radius: 4px;
    }

    .meta {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .composer {
      display: flex;
      gap: 10px;
      padding: 16px;
      background: var(--panel);
      border-top: 1px solid rgba(255,255,255,0.12);
    }

    input {
      flex: 1;
      padding: 12px 14px;
      border: 0;
      border-radius: 999px;
      font-size: 1rem;
      outline: none;
    }

    button {
      border: 0;
      padding: 12px 16px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: white;
      cursor: pointer;
      font-weight: 700;
    }

    button:hover { transform: translateY(-1px); }

    .hint {
      padding: 0 16px 16px;
      color: var(--muted);
      font-size: 0.92rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>🌈 Cloud Class Chat</h1>
      <p>Ask your AI buddy anything — it is powered by our class proxy!</p>
    </div>

    <div class="chat-area" id="chatArea"></div>

    <div class="composer">
      <input id="promptInput" type="text" placeholder="Type your question here..." />
      <button id="sendBtn">Send 🚀</button>
    </div>
    <div class="hint">Tip: Try asking for help with homework, coding, or a fun story.</div>
  </div>

  <script>
    const chatArea = document.getElementById('chatArea');
    const promptInput = document.getElementById('promptInput');
    const sendBtn = document.getElementById('sendBtn');

    // === TEACHER'S MAGIC CODE ===
    // Students: this is the important API logic. Feel free to learn from it, but change it carefully.
    async function askAI(message) {
      const response = await fetch('https://madankumarpichamuthu.github.io/litellmproxy/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer sk-vibe-summer-2026'
        },
        body: JSON.stringify({
          model: 'class-chat-model',
          messages: [{ role: 'user', content: message }]
        })
      });

      const data = await response.json();
      return data.choices?.[0]?.message?.content || 'Oops! The AI had no reply.';
    }

    // === KIDS UI CODE ===
    // Students: this is the simpler part for making the page feel fun and interactive.
    function addMessage(text, role) {
      const row = document.createElement('div');
      row.className = `message ${role}`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = role === 'user' ? 'You' : 'AI Buddy';

      row.appendChild(bubble);
      row.appendChild(meta);
      chatArea.appendChild(row);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    async function sendMessage() {
      const message = promptInput.value.trim();
      if (!message) return;

      addMessage(message, 'user');
      promptInput.value = '';
      addMessage('Thinking... ✨', 'bot');

      try {
        const reply = await askAI(message);
        chatArea.lastChild.remove();
        addMessage(reply, 'bot');
      } catch (error) {
        chatArea.lastChild.remove();
        addMessage('Something went wrong. Check the proxy URL and key.', 'bot');
        console.error(error);
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    promptInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') sendMessage();
    });

    addMessage('Hi! I am your classroom AI helper. Ask me anything! 🌟', 'bot');
  </script>
</body>
</html>
